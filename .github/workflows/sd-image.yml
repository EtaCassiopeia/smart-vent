name: SD Image

on:
  push:
    tags: ['hub-v*']
  pull_request:
    # The bake is expensive (~30-60 min on QEMU), so we only run it on
    # PRs that actually touch the sd-image bits. Matches the pattern in
    # firmware.yml and provision.yml.
    paths:
      - 'sd-image/**'
      - 'pi/**'
      - '.github/workflows/sd-image.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag, branch, or SHA to bake (default: current ref)'
        required: false
        default: ''

concurrency:
  group: sd-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # softprops/action-gh-release needs this on tag builds

env:
  PI_GEN_REPO: https://github.com/RPi-Distro/pi-gen
  # Track a known-good pi-gen tag rather than main. Bookworm support
  # was stable here; bumping is a deliberate act.
  PI_GEN_REF: 2024-11-19-raspios-bookworm

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout smart-vent
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          path: smart-vent

      - name: Determine version stamp
        id: ver
        run: |
          if [[ "${GITHUB_REF}" =~ refs/tags/hub-v ]]; then
            v="${GITHUB_REF_NAME}"
          else
            v="dev-${GITHUB_SHA:0:7}"
          fi
          echo "version=$v" >>"$GITHUB_OUTPUT"

      - name: Install QEMU binfmt for ARM emulation
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static binfmt-support
          # pi-gen's Docker build will also handle this, but priming
          # binfmt here avoids a chicken-and-egg on the first stage.
          sudo systemctl restart systemd-binfmt || true

      - name: Clone pi-gen
        run: |
          git clone --depth 1 --branch "${PI_GEN_REF}" "${PI_GEN_REPO}" pi-gen

      - name: Drop in smart-vent config + stage
        run: |
          cp smart-vent/sd-image/config pi-gen/config
          cp -r smart-vent/sd-image/stage-smart-vent pi-gen/
          # Make sure the stage isn't accidentally skipped.
          ls -la pi-gen/stage-smart-vent

      - name: Build the image
        env:
          SMART_VENT_SRC_HOST: ${{ github.workspace }}/smart-vent
          SMART_VENT_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cd pi-gen
          # CONTINUE=1 lets the build resume if a step fails partway;
          # PRESERVE_CONTAINER=0 keeps the runner clean between
          # workflow invocations.
          sudo \
            SMART_VENT_SRC_HOST="${SMART_VENT_SRC_HOST}" \
            SMART_VENT_VERSION="${SMART_VENT_VERSION}" \
            CONTINUE=1 \
            PRESERVE_CONTAINER=0 \
            ./build-docker.sh

      - name: Inventory + checksum the output
        id: deploy
        run: |
          cd pi-gen/deploy
          ls -la
          IMG=$(ls *.img.xz | head -1)
          if [[ -z "$IMG" ]]; then
            echo "::error::no .img.xz produced by pi-gen" >&2
            exit 1
          fi
          sha256sum "$IMG" | tee "${IMG}.sha256"
          # Stable artifact name based on our version stamp.
          NEW="smart-vent-hub-${{ steps.ver.outputs.version }}.img.xz"
          mv "$IMG" "$NEW"
          mv "${IMG}.sha256" "${NEW}.sha256"
          echo "image=$NEW" >>"$GITHUB_OUTPUT"

      - name: Upload build artifact (manual dispatch + branch builds)
        uses: actions/upload-artifact@v4
        with:
          name: sd-image-${{ steps.ver.outputs.version }}
          path: |
            pi-gen/deploy/${{ steps.deploy.outputs.image }}
            pi-gen/deploy/${{ steps.deploy.outputs.image }}.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/hub-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            pi-gen/deploy/${{ steps.deploy.outputs.image }}
            pi-gen/deploy/${{ steps.deploy.outputs.image }}.sha256
